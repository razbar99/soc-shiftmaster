<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>SOC MASTER PRO - Enterprise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@400;700&display=swap');
        body { font-family: 'Assistant', sans-serif; background: #f8fafc; }
        .tab-active { border-bottom: 3px solid #2563eb; color: #1e40af; font-weight: bold; }
        .is-draft { border: 2px dashed #3b82f6 !important; opacity: 0.7; }
        .my-shift { border: 2px solid #f59e0b !important; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

<div id="login-screen" class="fixed inset-0 bg-slate-900 z-50 flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-xl shadow-2xl w-80 text-center">
        <i class="fa-solid fa-shield-halved text-4xl text-blue-600 mb-4"></i>
        <h1 class="text-xl font-bold mb-4 italic">SOC SECURE LOGIN</h1>
        <input type="email" id="l-email" placeholder="אימייל" class="w-full p-2 border rounded mb-3 text-right">
        <input type="password" id="l-pass" placeholder="סיסמה" class="w-full p-2 border rounded mb-4 text-right">
        <button onclick="login()" class="w-full bg-blue-600 text-white p-2 rounded font-bold hover:bg-blue-700">כניסה</button>
    </div>
</div>

<div id="app" style="display:none" class="flex-1 flex flex-col overflow-hidden">
    <nav class="bg-slate-900 text-white p-4 flex justify-between px-8 shadow-lg">
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-shield-halved text-blue-400"></i>
            <span class="font-bold tracking-tight italic">SOC<span class="text-blue-400">MASTER</span></span>
        </div>
        <div class="flex items-center gap-4">
            <span id="display-name" class="text-xs bg-slate-800 px-2 py-1 rounded border border-slate-700"></span>
            <button onclick="location.reload()" class="text-xs text-slate-400 hover:text-white">התנתק</button>
        </div>
    </nav>

    <div class="p-4 flex gap-4 border-b bg-white overflow-x-auto shadow-sm">
        <button onclick="showTab('board')" id="t-board" class="tab-active px-3 py-1 whitespace-nowrap">לוח משמרות</button>
        <button onclick="showTab('handover')" id="t-handover" class="px-3 py-1 text-orange-600 font-bold whitespace-nowrap italic">יומן חפיפות</button>
        <button onclick="showTab('admin')" id="t-admin" class="hidden admin-only px-3 py-1 text-blue-700 font-bold whitespace-nowrap border-r pr-4 italic">ניהול מערכת וצוות</button>
        <button onclick="showTab('personal')" id="t-personal" class="px-3 py-1 text-indigo-600 font-medium whitespace-nowrap">הגשת אילוץ</button>
    </div>

    <div class="flex-1 overflow-y-auto p-4 md:p-8">
        <div id="v-board" class="max-w-7xl mx-auto space-y-4">
            <div class="flex justify-between items-center bg-white p-4 rounded-xl shadow-sm border">
                <button onclick="moveWeek(-7)" class="p-2 hover:bg-slate-100 rounded-full">➡️</button>
                <h2 id="week-label" class="font-bold text-lg"></h2>
                <button onclick="moveWeek(7)" class="p-2 hover:bg-slate-100 rounded-full">⬅️</button>
            </div>
            <div id="grid" class="grid grid-cols-1 md:grid-cols-7 gap-3"></div>
        </div>

        <div id="v-handover" class="hidden max-w-3xl mx-auto space-y-4">
            <div class="bg-white p-6 rounded-xl border border-orange-200 shadow-sm">
                <h3 class="font-bold mb-3 text-orange-800 italic">דיווח חפיפה חדש</h3>
                <textarea id="h-content" class="w-full border p-3 rounded-lg min-h-[100px] outline-none focus:ring-2 focus:ring-orange-400" placeholder="דגשים, אירועים פתוחים..."></textarea>
                <button onclick="saveHandover()" class="mt-3 bg-orange-600 text-white px-6 py-2 rounded-lg font-bold shadow-md">שלח חפיפה</button>
            </div>
            <div id="h-list" class="space-y-3"></div>
        </div>

        <div id="v-admin" class="hidden max-w-5xl mx-auto space-y-8 pb-10">
            <button onclick="publishWeek()" class="bg-blue-600 text-white p-4 rounded-xl w-full font-bold shadow-xl hover:bg-blue-700 transition transform active:scale-95 text-lg">פרסם סידור לכל הצוות כעת</button>
            
            <div class="bg-white p-6 border rounded-xl shadow-sm">
                <h3 class="font-bold mb-4 text-slate-700 border-b pb-2 italic">שיבוץ מהיר (טיוטה)</h3>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                    <input type="date" id="s-date" class="border p-2 rounded bg-slate-50">
                    <select id="s-type" class="border p-2 rounded bg-slate-50"><option>בוקר</option><option>ערב</option><option>לילה</option></select>
                    <select id="s-list" class="border p-2 rounded bg-slate-50"></select>
                    <button onclick="saveShift()" class="bg-slate-800 text-white px-4 py-2 rounded font-bold shadow-md">שבץ כטיוטה</button>
                </div>
            </div>

            <div class="bg-white p-6 border rounded-xl shadow-sm border-t-4 border-green-500">
                <h3 class="font-bold mb-4 text-green-700 italic border-b pb-2">ניהול עובדים ומכסות חסימה</h3>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                    <input type="text" id="n-name" placeholder="שם מלא" class="border p-2 rounded">
                    <input type="email" id="n-email" placeholder="מייל" class="border p-2 rounded text-left">
                    <input type="text" id="n-pass" placeholder="סיסמה" class="border p-2 rounded text-left">
                    <button onclick="addUser()" class="bg-green-600 text-white rounded font-bold">הוסף עובד</button>
                </div>
                <div id="u-list-view" class="space-y-2"></div>
            </div>

            <div class="space-y-3">
                <h3 class="font-bold text-slate-700 italic">בקשות ממתינות לאישור</h3>
                <div id="req-list" class="space-y-2"></div>
            </div>
        </div>

        <div id="v-personal" class="hidden max-w-md mx-auto bg-white p-8 border rounded-2xl shadow-xl">
            <h3 class="font-bold text-xl mb-2 text-indigo-700 italic">הגשת אילוץ אישי</h3>
            <p id="q-info" class="text-xs text-slate-500 mb-6"></p>
            <div class="space-y-4">
                <input type="date" id="p-date" class="w-full border p-3 rounded-xl bg-slate-50">
                <select id="p-type" class="w-full border p-3 rounded-xl bg-slate-50 font-bold"><option>אילוץ</option><option>מילואים</option></select>
                <textarea id="p-reason" class="w-full border p-3 rounded-xl h-24 bg-slate-50" placeholder="סיבת האילוץ..."></textarea>
                <button onclick="sendReq()" class="w-full bg-indigo-600 text-white p-3 rounded-xl font-bold shadow-lg">שלח לאישור מנהל</button>
            </div>
        </div>
    </div>
</div>

<script>
    const API_URL = window.location.origin;
    let userData = null;
    let currentSun = (function(d){ d.setHours(0,0,0,0); return new Date(d.setDate(d.getDate() - d.getDay())); })(new Date());

    async function login() {
        const email = document.getElementById('l-email').value;
        const pass = document.getElementById('l-pass').value;
        const res = await fetch(`${API_URL}/api/login`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({email, password: pass})});
        if(res.ok) {
            const d = await res.json(); userData = d.user;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            document.getElementById('display-name').innerText = userData.name + " (" + (userData.role === 'Admin' ? 'מנהל' : 'עובד') + ")";
            if(userData.role === 'Admin') document.querySelectorAll('.admin-only').forEach(e => e.classList.remove('hidden'));
            showTab('board');
        } else alert("פרטים שגויים");
    }

    function showTab(t) {
        ['board','handover','admin','personal'].forEach(v => { document.getElementById('v-'+v).classList.add('hidden'); document.getElementById('t-'+v).classList.remove('tab-active'); });
        document.getElementById('v-'+t).classList.remove('hidden');
        document.getElementById('t-'+t).classList.add('tab-active');
        if(t==='board') renderBoard();
        if(t==='handover') loadH();
        if(t==='admin') { loadR(); loadUsers(); loadStaffList(); }
        if(t==='personal') document.getElementById('q-info').innerText = `מכסת האילוצים שלך: ${userData.max_blocks} בשבוע.`;
    }

    async function renderBoard() {
        const end = new Date(currentSun); end.setDate(end.getDate() + 6);
        document.getElementById('week-label').innerText = `${currentSun.getDate()}/${currentSun.getMonth()+1} - ${end.getDate()}/${end.getMonth()+1}`;
        const res = await fetch(`${API_URL}/api/shifts`); const shifts = await res.json();
        const grid = document.getElementById('grid'); grid.innerHTML = '';
        for(let i=0; i<7; i++) {
            let d = new Date(currentSun); d.setDate(d.getDate() + i); let dStr = d.toISOString().split('T')[0];
            let dayHtml = `<div class="bg-white border rounded shadow-sm min-h-[250px]"><div class="bg-slate-800 text-white text-center text-xs p-1 font-bold uppercase tracking-widest">${d.getDate()}/${d.getMonth()+1}</div><div class="p-1 space-y-1">`;
            shifts.filter(s => s.date === dStr).forEach(s => {
                if(s.is_draft && userData.role !== 'Admin') return;
                let isMine = s.staff.includes(userData.name) ? 'my-shift' : '';
                let draftCls = s.is_draft ? 'is-draft' : '';
                let color = s.type === 'בוקר' ? 'bg-amber-50' : s.type === 'ערב' ? 'bg-orange-50' : 'bg-indigo-50';
                dayHtml += `<div class="p-1 text-[10px] rounded border font-bold shadow-inner ${color} ${draftCls} ${isMine}">${s.type}: ${s.staff}</div>`;
            });
            grid.innerHTML += dayHtml + `</div></div>`;
        }
    }

    async function loadStaffList() {
        const res = await fetch(`${API_URL}/api/users`); const users = await res.json();
        document.getElementById('u-list-view').innerHTML = users.map(u => `
            <div class="flex justify-between items-center p-3 bg-slate-50 border rounded-lg text-xs">
                <div><strong>${u.name}</strong> (${u.email})</div>
                <div class="flex gap-2">
                    <input type="number" onchange="updateQuota('${u.email}', this.value)" value="${u.max_blocks}" class="w-10 border rounded text-center font-bold">
                    ${u.email !== 'raz@soc.com' ? `<button onclick="deleteUser('${u.email}')" class="text-red-500 font-bold">מחק</button>` : ''}
                </div>
            </div>`).join('');
    }

    async function addUser() {
        const payload = { name: document.getElementById('n-name').value, email: document.getElementById('n-email').value, password: document.getElementById('n-pass').value, role: 'User' };
        await fetch(`${API_URL}/api/users`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload)});
        loadStaffList();
    }

    async function updateQuota(email, val) {
        await fetch(`${API_URL}/api/users/quota`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({email, max_blocks: parseInt(val)})});
    }

    async function deleteUser(email) {
        if(confirm(`למחוק את ${email}?`)) {
            await fetch(`${API_URL}/api/users/delete`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({email})});
            loadStaffList();
        }
    }

    // פונקציות קיימות...
    async function saveShift() {
        const payload = { date: document.getElementById('s-date').value, shift_type: document.getElementById('s-type').value, staff: document.getElementById('s-list').value };
        await fetch(`${API_URL}/api/shifts`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload)});
        renderBoard();
    }
    async function publishWeek() {
        const start = currentSun.toISOString().split('T')[0];
        const end = new Date(currentSun); end.setDate(end.getDate() + 6);
        await fetch(`${API_URL}/api/shifts/publish`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({start, end: end.toISOString().split('T')[0]})});
        alert("פורסם!"); renderBoard();
    }
    async function saveHandover() {
        await fetch(`${API_URL}/api/handovers`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({author: userData.name, content: document.getElementById('h-content').value})});
        document.getElementById('h-content').value = ''; loadH();
    }
    async function loadH() {
        const res = await fetch(`${API_URL}/api/handovers`); const data = await res.json();
        document.getElementById('h-list').innerHTML = data.map(h => `<div class="p-3 border-r-4 border-orange-400 bg-white text-xs shadow-sm rounded-lg"><strong>${h.author}:</strong> ${h.content} <span class="text-[9px] opacity-40 float-left">${h.timestamp}</span></div>`).join('');
    }
    async function loadUsers() {
        const res = await fetch(`${API_URL}/api/users`); const users = await res.json();
        document.getElementById('s-list').innerHTML = users.map(u => `<option>${u.name}</option>`).join('');
    }
    async function sendReq() {
        const payload = { name: userData.name, email: userData.email, date: document.getElementById('p-date').value, req_type: document.getElementById('p-type').value, reason: document.getElementById('p-reason').value };
        await fetch(`${API_URL}/api/requests`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload)});
        alert("נשלח לאישור!");
    }
    async function loadR() {
        const res = await fetch(`${API_URL}/api/requests`); const data = await res.json();
        document.getElementById('req-list').innerHTML = data.filter(r => r.status === 'ממתין').map(r => `<div class="p-3 bg-white border rounded-xl text-xs flex justify-between shadow-sm border-l-4 border-l-red-400"><span><strong>${r.name}:</strong> ${r.date} (${r.reason})</span><div class="flex gap-2"><button onclick="updateR(${r.id},'אושר')" class="text-green-600 font-bold">V</button><button onclick="updateR(${r.id},'נדחה')" class="text-red-500 font-bold">X</button></div></div>`).join('');
    }
    async function updateR(id, status) {
        await fetch(`${API_URL}/api/requests/status`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({req_id: id, status})});
        loadR();
    }
    function moveWeek(d) { currentSun.setDate(currentSun.getDate() + d); renderBoard(); }
</script>
</body>
</html>
