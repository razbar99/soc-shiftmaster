<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>SOC MASTER PRO v6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap');
        body { font-family: 'Assistant', sans-serif; background: #f1f5f9; }
        .tab-active { border-bottom: 4px solid #2563eb; color: #1e40af; font-weight: 800; }
        .is-draft { border: 2px dashed #3b82f6 !important; opacity: 0.6; }
        .hidden { display: none; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

<div id="login-screen" class="fixed inset-0 bg-slate-900 z-50 flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-80 text-center">
        <h1 class="text-2xl font-black mb-6 text-blue-600 italic">SOC MASTER</h1>
        <input type="email" id="l-email" placeholder="אימייל" class="w-full p-2 border rounded-xl mb-3 text-right">
        <input type="password" id="l-pass" placeholder="סיסמה" class="w-full p-2 border rounded-xl mb-4 text-right">
        <button onclick="login()" class="w-full bg-blue-600 text-white p-2 rounded-xl font-bold">כניסה</button>
    </div>
</div>

<div id="app" class="hidden flex-1 flex flex-col overflow-hidden">
    <nav class="bg-slate-900 text-white p-4 flex justify-between px-8 shadow-xl items-center">
        <span class="font-black text-xl italic text-blue-400">SOC MASTER</span>
        <span id="display-name" class="text-xs font-bold border px-3 py-1 rounded-full bg-slate-800 border-slate-700"></span>
    </nav>

    <div class="p-2 flex gap-6 border-b bg-white overflow-x-auto px-8 shadow-sm">
        <button onclick="showTab('board')" id="t-board" class="tab-active py-3 px-1 font-bold">📅 לוח</button>
        <button onclick="showTab('admin')" id="t-admin" class="hidden admin-only py-3 px-1 text-blue-700 font-bold border-r pr-6">🛠 ניהול צוות</button>
        <button onclick="showTab('personal')" id="t-personal" class="py-3 px-1 text-indigo-600 font-bold">📋 הגשת זמינות</button>
    </div>

    <div class="flex-1 overflow-y-auto p-4 md:p-8">
        <div id="v-board" class="max-w-7xl mx-auto space-y-4 text-right">
            <div class="flex justify-between items-center bg-white p-4 rounded-xl shadow-sm border">
                <button onclick="moveWeek(-7)">➡️</button><h2 id="week-label" class="font-black"></h2><button onclick="moveWeek(7)">⬅️</button>
            </div>
            <div id="grid" class="grid grid-cols-1 md:grid-cols-7 gap-3 text-center"></div>
        </div>

        <div id="v-admin" class="hidden max-w-5xl mx-auto space-y-8 pb-20 text-right">
            <div class="bg-gradient-to-r from-purple-600 to-indigo-700 p-6 rounded-2xl text-white shadow-xl">
                <h3 class="font-black text-xl mb-2 italic">AI AUTO-SCHEDULER</h3>
                <p class="text-xs opacity-80 mb-4">המערכת תנתח את כל המטריצות של העובדים ותמלא את המשמרות הפנויות אוטומטית.</p>
                <button onclick="runAutoAssign()" class="bg-white text-indigo-700 px-8 py-3 rounded-xl font-black hover:bg-indigo-50 transition shadow-lg">שבץ לי את השבוע אוטומטית</button>
            </div>

            <button onclick="publishWeek()" class="bg-blue-600 text-white p-4 rounded-2xl w-full font-bold shadow-xl">פרסם סידור רשמי לכולם</button>
            
            <div class="bg-white p-6 border rounded-2xl shadow-sm border-t-8 border-blue-600">
                <h3 class="font-bold mb-4 italic text-blue-700 border-b pb-2">ניהול עובדים ומכסות</h3>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6 bg-slate-50 p-4 rounded-xl">
                    <input type="text" id="n-name" placeholder="שם מלא" class="border p-2 rounded text-sm">
                    <input type="email" id="n-email" placeholder="אימייל" class="border p-2 rounded text-sm">
                    <input type="text" id="n-role" placeholder="תפקיד" class="border p-2 rounded text-sm">
                    <input type="text" id="n-pass" placeholder="סיסמה" class="border p-2 rounded text-sm">
                    <div class="text-[10px]">בוקר: <input type="number" id="q-m" value="2" class="w-8 border"></div>
                    <div class="text-[10px]">ערב: <input type="number" id="q-e" value="2" class="w-8 border"></div>
                    <div class="text-[10px]">לילה: <input type="number" id="q-n" value="1" class="w-8 border"></div>
                    <div class="text-[10px]">סופ"ש: <input type="number" id="q-w" value="1" class="w-8 border"></div>
                    <button onclick="saveUser()" class="col-span-full bg-blue-600 text-white p-2 rounded font-bold mt-2">שמור / עדכן עובד</button>
                </div>
                <div id="u-list-view" class="grid gap-2"></div>
            </div>
        </div>

        <div id="v-personal" class="hidden max-w-4xl mx-auto bg-white p-6 rounded-3xl shadow-2xl text-right">
            <h3 class="font-black text-2xl mb-6 text-slate-800 border-b pb-2 italic">הגשת זמינות שבועית (V=פנוי, X=חסום)</h3>
            <div class="flex justify-center items-center gap-4 mb-6 bg-slate-50 p-3 rounded-2xl border">
                <button onclick="movePersonalWeek(-7)" class="text-xl">➡️</button><span id="p-week-label" class="font-bold text-blue-600"></span><button onclick="movePersonalWeek(7)" class="text-xl">⬅️</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full border-collapse">
                    <thead><tr id="p-days-row" class="bg-slate-100"><th class="p-2 border italic text-[10px]">משמרת</th></tr></thead>
                    <tbody id="p-matrix-body"></tbody>
                </table>
            </div>
            <textarea id="p-notes" class="w-full border p-3 rounded-xl mt-4 h-20 bg-slate-50 outline-none" placeholder="הערות..."></textarea>
            <button onclick="saveAvailability()" class="mt-4 w-full bg-green-600 text-white p-4 rounded-xl font-black text-lg shadow-lg">💾 שמור זמינות שבועית</button>
        </div>
    </div>
</div>

<script>
    const API_URL = window.location.origin;
    let userData = null; let selectedStaff = "";
    let currentSun = (function(d){ d.setHours(0,0,0,0); return new Date(d.setDate(d.getDate() - d.getDay())); })(new Date());
    let pSun = new Date(currentSun);

    async function login() {
        const res = await fetch(`${API_URL}/api/login`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email:document.getElementById('l-email').value, password:document.getElementById('l-pass').value})});
        if(res.ok) {
            userData = (await res.json()).user;
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('display-name').innerText = userData.name + (userData.role==='Admin'?' [ADMIN]':'');
            if(userData.role==='Admin') document.querySelectorAll('.admin-only').forEach(x=>x.classList.remove('hidden'));
            showTab('board');
        } else alert("פרטים שגויים");
    }

    function showTab(t) {
        ['board', 'admin', 'personal'].forEach(id => {
            const v = document.getElementById('v-'+id); const b = document.getElementById('t-'+id);
            if(v) v.classList.add('hidden'); if(b) b.classList.remove('tab-active');
        });
        document.getElementById('v-'+t).classList.remove('hidden'); document.getElementById('t-'+t).classList.add('tab-active');
        if(t==='board') renderBoard();
        if(t==='personal') renderMatrix();
        if(t==='admin') loadStaff();
    }

    async function renderBoard() {
        const end = new Date(currentSun); end.setDate(end.getDate() + 6);
        document.getElementById('week-label').innerText = `${currentSun.getDate()}/${currentSun.getMonth()+1} - ${end.getDate()}/${end.getMonth()+1}`;
        const res = await fetch(`${API_URL}/api/shifts`); const shifts = await res.json();
        const grid = document.getElementById('grid'); grid.innerHTML = '';
        for(let i=0; i<7; i++) {
            let d = new Date(currentSun); d.setDate(d.getDate() + i); let dStr = d.toISOString().split('T')[0];
            let html = `<div class="bg-white border rounded-xl min-h-[180px] shadow-sm"><div class="bg-slate-800 text-white text-[10px] p-1 uppercase">${d.getDate()}/${d.getMonth()+1}</div><div class="p-1 space-y-1">`;
            shifts.filter(s => s.date === dStr).forEach(s => {
                if(s.is_draft && userData.role !== 'Admin') return;
                html += `<div class="p-1 text-[9px] rounded border font-bold bg-blue-50 ${s.is_draft?'is-draft':''}">${s.type}: ${s.staff}</div>`;
            });
            grid.innerHTML += html + `</div></div>`;
        }
    }

    function renderMatrix() {
        const end = new Date(pSun); end.setDate(end.getDate() + 6);
        document.getElementById('p-week-label').innerText = `${pSun.getDate()}/${pSun.getMonth()+1} - ${end.getDate()}/${end.getMonth()+1}`;
        let daysHtml = '<th class="p-2 border text-[10px] bg-slate-200">משמרת</th>';
        for(let i=0; i<7; i++) {
            let d = new Date(pSun); d.setDate(d.getDate() + i);
            daysHtml += `<th class="p-2 border text-[10px] bg-slate-100">${['א','ב','ג','ד','ה','ו','ש'][i]}'<br>${d.getDate()}/${d.getMonth()+1}</th>`;
        }
        document.getElementById('p-days-row').innerHTML = daysHtml;
        let bodyHtml = '';
        ['בוקר','ערב','לילה'].forEach(type => {
            bodyHtml += `<tr><td class="p-2 border font-bold text-xs bg-slate-50">${type}</td>`;
            for(let i=0; i<7; i++) {
                let d = new Date(pSun); d.setDate(d.getDate() + i);
                let id = `cell-${d.toISOString().split('T')[0]}-${type}`;
                bodyHtml += `<td class="border p-0 text-center"><div onclick="toggleCell('${id}')" id="${id}" data-state="v" class="h-10 flex items-center justify-center cursor-pointer bg-green-50 text-green-600"><i class="fa-solid fa-check"></i></div></td>`;
            }
            bodyHtml += `</tr>`;
        });
        document.getElementById('p-matrix-body').innerHTML = bodyHtml;
    }

    function toggleCell(id) {
        const el = document.getElementById(id);
        const isV = el.getAttribute('data-state') === 'v';
        el.setAttribute('data-state', isV ? 'x' : 'v');
        el.className = isV ? "h-10 flex items-center justify-center cursor-pointer bg-red-50 text-red-600" : "h-10 flex items-center justify-center cursor-pointer bg-green-50 text-green-600";
        el.innerHTML = isV ? '<i class="fa-solid fa-xmark"></i>' : '<i class="fa-solid fa-check"></i>';
    }

    async function saveAvailability() {
        const cells = document.querySelectorAll('[id^="cell-"]');
        for (let c of cells) {
            if (c.getAttribute('data-state') === 'x') {
                const p = c.id.split('-');
                await fetch(`${API_URL}/api/requests`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name:userData.name, email:userData.email, date:`${p[1]}-${p[2]}-${p[3]}`, req_type:'חסום: '+p[4], reason:document.getElementById('p-notes').value})});
            }
        }
        alert("זמינות נשמרה!"); showTab('board');
    }

    async function runAutoAssign() {
        if(!confirm("שבץ שבוע אוטומטית?")) return;
        const start = currentSun.toISOString().split('T')[0];
        const end = new Date(currentSun); end.setDate(end.getDate() + 6);
        await fetch(`${API_URL}/api/shifts/auto-assign`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({start, end: end.toISOString().split('T')[0]})});
        alert("השיבוץ הושלם!"); renderBoard();
    }

    async function loadStaff() {
        const res = await fetch(`${API_URL}/api/users`);
        const users = await res.json(); window.allUsers = users;
        document.getElementById('u-list-view').innerHTML = users.map(u => `
            <div class="p-2 border rounded bg-slate-50 flex justify-between items-center text-[10px]">
                <span><strong>${u.name}</strong> (${u.role})</span>
                <div class="flex gap-2">
                    <button onclick="editUser('${u.email}')" class="text-blue-600">ערוך</button>
                    <button onclick="deleteUser('${u.email}')" class="text-red-500">מחק</button>
                </div>
            </div>`).join('');
    }

    function editUser(email) {
        const u = window.allUsers.find(x => x.email === email);
        document.getElementById('n-name').value = u.name;
        document.getElementById('n-email').value = u.email;
        document.getElementById('n-role').value = u.role;
        document.getElementById('n-pass').value = u.password;
    }

    async function saveUser() {
        const p = { name: document.getElementById('n-name').value, email: document.getElementById('n-email').value, role: document.getElementById('n-role').value, password: document.getElementById('n-pass').value, q_morning: document.getElementById('q-m').value, q_evening: document.getElementById('q-e').value, q_night: document.getElementById('q-n').value, q_weekend: document.getElementById('q-w').value };
        await fetch(`${API_URL}/api/users/save`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(p)});
        alert("נשמר!"); loadStaff();
    }

    async function deleteUser(email) {
        if(confirm("למחוק?")) {
            await fetch(`${API_URL}/api/users/delete`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email})});
            loadStaff();
        }
    }

    function moveWeek(d) { currentSun.setDate(currentSun.getDate() + d); renderBoard(); }
    function movePersonalWeek(d) { pSun.setDate(pSun.getDate() + d); renderMatrix(); }
    function publishWeek() { /* פונקציית פרסום קיימת בשרת */ }
</script>
</body>
</html>
