<div class="bg-white p-6 rounded-2xl shadow-lg border border-blue-100">
    <h3 class="font-black mb-4 text-blue-900"><i class="fa-solid fa-wand-magic-sparkles ml-2"></i>שיבוץ חכם מבוסס אילוצים</h3>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="space-y-2">
            <label class="text-xs font-bold text-slate-500">1. בחר תאריך</label>
            <input type="date" id="s-date" onchange="checkAvailability(this.value)" class="w-full p-3 border rounded-xl bg-slate-50 outline-none focus:ring-2 focus:ring-blue-400">
        </div>
        <div class="space-y-2">
            <label class="text-xs font-bold text-slate-500">2. בחר משמרת</label>
            <select id="s-type" class="w-full p-3 border rounded-xl bg-slate-50 font-bold">
                <option>בוקר</option><option>ערב</option><option>לילה</option>
            </select>
        </div>
        <div class="space-y-2">
            <label class="text-xs font-bold text-slate-500">3. סטטוס אנליסטים</label>
            <div id="availability-list" class="max-h-40 overflow-y-auto border rounded-xl p-2 bg-slate-50 space-y-1">
                <p class="text-center text-xs text-slate-400 py-4 font-bold italic">בחר תאריך כדי לראות זמינות...</p>
            </div>
        </div>
    </div>
    <button onclick="saveShift()" id="btn-save" disabled class="mt-6 w-full bg-slate-900 text-white p-4 rounded-xl font-black opacity-50 cursor-not-allowed transition shadow-xl">שבץ כטיוטה</button>
</div>

<script>
    // פונקציית הזמינות - ה"לב" של המערכת
    async function checkAvailability(date) {
        if(!date) return;
        const res = await fetch(`${API_URL}/api/admin/availability/${date}`);
        const users = await res.json();
        const list = document.getElementById('availability-list');
        const btn = document.getElementById('btn-save');
        
        list.innerHTML = users.map(u => `
            <div onclick="selectAnalyst('${u.name}', ${u.is_blocked})" class="flex justify-between items-center p-2 rounded-lg cursor-pointer transition ${u.is_blocked ? 'bg-red-50 text-red-700 opacity-60' : 'bg-green-50 text-green-700 hover:bg-green-100'}">
                <span class="text-xs font-bold">${u.is_blocked ? '❌' : '✅'} ${u.name}</span>
                <span class="text-[9px] italic">${u.is_blocked ? u.block_reason : 'פנוי'}</span>
            </div>
        `).join('');
        
        btn.disabled = false;
        btn.classList.remove('opacity-50', 'cursor-not-allowed');
    }

    let selectedAnalyst = null;
    function selectAnalyst(name, blocked) {
        if(blocked && !confirm(`העובד ${name} הגיש אילוץ לתאריך זה. האם לשבץ אותו בכל זאת?`)) return;
        selectedAnalyst = name;
        alert(`נבחר: ${name}`);
    }

    async function saveShift() {
        if(!selectedAnalyst) return alert("בחר אנליסט מהרשימה");
        const payload = { 
            date: document.getElementById('s-date').value, 
            shift_type: document.getElementById('s-type').value, 
            staff: selectedAnalyst 
        };
        const res = await fetch(`${API_URL}/api/shifts/secure-save`, { 
            method: 'POST', 
            headers: {'Content-Type': 'application/json'}, 
            body: JSON.stringify(payload)
        });
        const r = await res.json();
        if(r.status === "error") alert(r.message);
        else { alert("שובץ כטיוטה!"); renderBoard(); }
    }
</script>
