<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOC MASTER ENTERPRISE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap');
        body { font-family: 'Assistant', sans-serif; background-color: #f1f5f9; }
        .tab-active { border-bottom: 4px solid #2563eb; color: #1e40af; font-weight: bold; }
        .my-shift { border: 3px solid #f59e0b !important; box-shadow: 0 0 10px rgba(245, 158, 11, 0.3); }
        .is-draft { border: 2px dashed #3b82f6 !important; opacity: 0.7; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <div id="login-screen" class="fixed inset-0 bg-slate-900 z-50 flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-sm text-center">
            <h1 class="text-2xl font-bold mb-6 text-blue-600 italic">SOC SECURE LOGIN</h1>
            <input type="email" id="l-email" placeholder="אימייל" class="w-full p-3 border rounded-lg mb-4 text-right">
            <input type="password" id="l-pass" placeholder="סיסמה" class="w-full p-3 border rounded-lg mb-6 text-right">
            <button onclick="login()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700">כניסה</button>
        </div>
    </div>

    <div id="app" style="display:none" class="flex flex-col h-full overflow-hidden">
        <nav class="bg-slate-900 text-white p-4 flex justify-between items-center px-8">
            <div class="text-xl font-bold italic"><i class="fa-solid fa-shield-halved text-blue-400"></i> SOC MASTER PRO</div>
            <div class="flex items-center gap-4">
                <span id="display-name" class="font-medium bg-slate-800 px-3 py-1 rounded"></span>
                <button onclick="location.reload()" class="text-slate-400 hover:text-white text-sm">התנתק</button>
            </div>
        </nav>

        <div class="flex-1 overflow-y-auto p-4">
            <div class="max-w-7xl mx-auto mb-6 flex gap-4 border-b border-slate-200 overflow-x-auto no-scrollbar">
                <button onclick="showTab('board')" id="t-board" class="tab-active px-4 py-2 whitespace-nowrap">לוח משמרות</button>
                <button onclick="showTab('handover')" id="t-handover" class="px-4 py-2 text-orange-600 font-bold whitespace-nowrap">יומן חפיפות</button>
                <button onclick="showTab('admin')" id="t-admin" class="px-4 py-2 hidden admin-only text-blue-700 font-bold whitespace-nowrap">ניהול ושיבוץ</button>
                <button onclick="showTab('staff')" id="t-staff" class="px-4 py-2 hidden admin-only text-green-700 font-bold whitespace-nowrap">מכסות וצוות</button>
                <button onclick="showTab('personal')" id="t-personal" class="px-4 py-2 whitespace-nowrap">הגשת אילוץ</button>
            </div>

            <div id="v-board" class="max-w-7xl mx-auto space-y-4">
                <div class="flex justify-between items-center bg-white p-4 rounded-xl shadow-sm border">
                    <button onclick="moveWeek(-7)" class="p-2 hover:bg-slate-100 rounded-full w-10 h-10"><i class="fa-solid fa-chevron-right"></i></button>
                    <h2 id="week-label" class="text-xl font-bold"></h2>
                    <button onclick="moveWeek(7)" class="p-2 hover:bg-slate-100 rounded-full w-10 h-10"><i class="fa-solid fa-chevron-left"></i></button>
                </div>
                <div id="grid" class="grid grid-cols-1 md:grid-cols-7 gap-4"></div>
            </div>

            <div id="v-handover" class="max-w-4xl mx-auto hidden space-y-6">
                <div class="bg-white p-6 rounded-xl border border-orange-200">
                    <h3 class="font-bold mb-4 text-orange-800 italic">דיווח חפיפה חדש</h3>
                    <textarea id="h-content" placeholder="אירועים חריגים, תקלות SIEM, דגשים..." class="w-full p-3 border rounded mb-3"></textarea>
                    <button onclick="saveHandover()" class="bg-orange-600 text-white px-6 py-2 rounded font-bold">שלח חפיפה</button>
                </div>
                <div id="handover-list" class="space-y-3"></div>
            </div>

            <div id="v-admin" class="max-w-5xl mx-auto hidden space-y-6">
                <div class="bg-blue-50 p-6 rounded-xl border border-blue-200 flex justify-between items-center shadow-inner">
                    <div>
                        <h3 class="font-bold text-blue-800">הפצת סידור העבודה</h3>
                        <p class="text-xs text-blue-600">כל השיבוצים שסימנת כטיוטה (מקווקו) יהפכו לרשמיים ויוצגו לעובדים.</p>
                    </div>
                    <button onclick="publishWeek()" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-700 shadow-lg">פרסם שבוע זה</button>
                </div>
                <div class="bg-white p-6 rounded-xl border">
                    <h3 class="font-bold mb-4 italic">שיבוץ מהיר (טיוטה)</h3>
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <input type="date" id="s-date" class="p-2 border rounded">
                        <select id="s-type" class="p-2 border rounded"><option value="בוקר">בוקר</option><option value="ערב">ערב</option><option value="לילה">לילה</option></select>
                        <select id="s-staff-list" class="p-2 border rounded"></select>
                        <button onclick="saveShift()" class="bg-blue-600 text-white rounded font-bold">הוסף כטיוטה</button>
                    </div>
                </div>
                <div id="req-list" class="space-y-3"></div>
            </div>

            <div id="v-staff" class="max-w-4xl mx-auto hidden space-y-6">
                <div class="bg-white p-6 rounded-xl border-t-4 border-green-500 shadow-md">
                    <h3 class="font-bold mb-4 text-green-700 italic">הוספת עובד וניהול מכסות</h3>
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                        <input type="text" id="n-name" placeholder="שם מלא" class="p-2 border rounded">
                        <input type="email" id="n-email" placeholder="אימייל" class="p-2 border rounded text-left">
                        <input type="text" id="n-pass" placeholder="סיסמה" class="p-2 border rounded text-left">
                        <button onclick="addUser()" class="bg-green-600 text-white rounded font-bold h-10">הוסף</button>
                    </div>
                </div>
                <div id="u-list-view" class="space-y-2"></div>
            </div>

            <div id="v-personal" class="max-w-xl mx-auto hidden bg-white p-8 rounded-2xl border shadow-lg">
                <h3 class="text-xl font-bold mb-2 italic text-indigo-700">הגשת אילוץ שבועי</h3>
                <p id="quota-info" class="text-xs text-slate-500 mb-6"></p>
                <div class="space-y-4">
                    <input type="date" id="p-date" class="w-full p-3 border rounded-lg bg-slate-50">
                    <select id="p-type" class="w-full p-3 border rounded-lg bg-slate-50"><option value="אילוץ">אילוץ (לא יכול)</option><option value="מילואים">מילואים</option></select>
                    <textarea id="p-reason" placeholder="פרט סיבה..." class="w-full p-3 border rounded-lg h-32"></textarea>
                    <button onclick="sendRequest()" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold">שלח לאישור</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;
        let userData = null;
        let currentSun = getSunday(new Date());

        function getSunday(d) { let date = new Date(d); date.setHours(0,0,0,0); return new Date(date.setDate(date.getDate() - date.getDay())); }
        function moveWeek(d) { currentSun.setDate(currentSun.getDate() + d); renderBoard(); }

        async function login() {
            const email = document.getElementById('l-email').value;
            const pass = document.getElementById('l-pass').value;
            try {
                const res = await fetch(`${API_URL}/api/login`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({email, password: pass})});
                if(res.ok) {
                    const d = await res.json(); userData = d.user;
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('app').style.display = 'flex';
                    document.getElementById('display-name').innerText = userData.name + " (" + (userData.role === 'Admin' ? 'מנהל' : 'עובד') + ")";
                    if(userData.role === 'Admin') document.querySelectorAll('.admin-only').forEach(e => e.classList.remove('hidden'));
                    showTab('board');
                } else alert("פרטים שגויים");
            } catch(e) { alert("שגיאת שרת"); }
        }

        function showTab(t) {
            ['board','handover','admin','staff','personal'].forEach(v => { document.getElementById('v-'+v).classList.add('hidden'); document.getElementById('t-'+v).classList.remove('tab-active'); });
            document.getElementById('v-'+t).classList.remove('hidden');
            document.getElementById('t-'+t).classList.add('tab-active');
            if(t==='board') renderBoard();
            if(t==='handover') loadHandovers();
            if(t==='admin') { loadRequests(); loadStaffSelect(); }
            if(t==='staff') loadStaffList();
            if(t==='personal') document.getElementById('quota-info').innerText = `המכסה השבועית שלך: ${userData.max_blocks} אילוצים.`;
        }

        async function renderBoard() {
            const end = new Date(currentSun); end.setDate(end.getDate() + 6);
            document.getElementById('week-label').innerText = `${currentSun.getDate()}/${currentSun.getMonth()+1} - ${end.getDate()}/${end.getMonth()+1}`;
            const grid = document.getElementById('grid'); grid.innerHTML = 'מעדכן...';
            const res = await fetch(`${API_URL}/api/shifts`); const data = await res.json();
            grid.innerHTML = '';
            for(let i=0; i<7; i++) {
                let d = new Date(currentSun); d.setDate(d.getDate() + i); let dStr = d.toISOString().split('T')[0];
                let dayHtml = `<div class="bg-white rounded-xl shadow-sm flex flex-col border min-h-[300px]"><div class="bg-slate-800 text-white text-center p-2 font-bold text-xs">${d.getDate()}/${d.getMonth()+1}</div><div class="p-2 space-y-2">`;
                data.filter(s => s.date === dStr).forEach(s => {
                    if(s.is_draft === 1 && userData.role !== 'Admin') return;
                    let isMine = s.staff.includes(userData.name) ? 'my-shift' : '';
                    let draftStyle = s.is_draft === 1 ? 'is-draft' : '';
                    let color = s.shift_type === 'בוקר' ? 'bg-amber-50' : s.shift_type === 'ערב' ? 'bg-orange-50' : 'bg-indigo-50';
                    dayHtml += `<div class="p-2 rounded-lg border text-[11px] shadow-sm ${color} ${isMine} ${draftStyle}">
                        <div class="font-bold flex justify-between uppercase text-[9px]">${s.is_draft ? 'טיוטה' : s.shift_type} 
                        ${userData.role === 'Admin' ? `<button onclick="deleteShift('${s.date}','${s.shift_type}')" class="text-red-400">X</button>` : ''}
                        </div><div class="mt-1 font-medium">${s.staff.replace(/, /g, '<br>')}</div></div>`;
                });
                grid.innerHTML += dayHtml + `</div></div>`;
            }
        }

        async function saveShift() {
            const payload = { date: document.getElementById('s-date').value, shift_type: document.getElementById('s-type').value, staff: document.getElementById('s-staff-list').value };
            await fetch(`${API_URL}/api/shifts`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload)});
            renderBoard();
        }

        async function publishWeek() {
            const start = currentSun.toISOString().split('T')[0];
            const end = new Date(currentSun); end.setDate(end.getDate() + 6);
            if(confirm(`להפיץ את הסידור לכל הצוות?`)) {
                await fetch(`${API_URL}/api/shifts/publish`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({start, end: end.toISOString().split('T')[0]})});
                alert("פורסם בהצלחה!"); renderBoard();
            }
        }

        async function loadStaffSelect() {
            const res = await fetch(`${API_URL}/api/users`); const users = await res.json();
            document.getElementById('s-staff-list').innerHTML = users.map(u => `<option value="${u.name}">${u.name}</option>`).join('');
        }

        async function loadStaffList() {
            const res = await fetch(`${API_URL}/api/users`); const users = await res.json();
            document.getElementById('u-list-view').innerHTML = users.map(u => `
                <div class="flex justify-between items-center p-3 bg-white border rounded-xl">
                    <div class="text-sm"><strong>${u.name}</strong> (${u.email})<br><span class="text-xs">מכסה: ${u.max_blocks}</span></div>
                    <div class="flex gap-2">
                        <input type="number" onchange="updateQuota('${u.email}', this.value)" value="${u.max_blocks}" class="w-12 border rounded text-center">
                        <button onclick="deleteUser('${u.email}')" class="text-red-500 text-xs">מחק</button>
                    </div>
                </div>`).join('');
        }

        async function updateQuota(email, val) {
            await fetch(`${API_URL}/api/users/quota`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({email, max_blocks: parseInt(val)})});
        }

        async function sendRequest() {
            const payload = { name: userData.name, email: userData.email, date: document.getElementById('p-date').value, req_type: document.getElementById('p-type').value, reason: document.getElementById('p-reason').value };
            const res = await fetch(`${API_URL}/api/requests`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload)});
            const r = await res.json();
            if(r.status === "error") alert(r.message); else alert("נשלח!");
        }

        async function saveHandover() {
            await fetch(`${API_URL}/api/handovers`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({author: userData.name, shift_type: 'חפיפה', content: document.getElementById('h-content').value})});
            document.getElementById('h-content').value = ''; loadHandovers();
        }

        async function loadHandovers() {
            const res = await fetch(`${API_URL}/api/handovers`); const data = await res.
