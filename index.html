<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOC MASTER ULTIMATE v23</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap');
        body { font-family: 'Assistant', sans-serif; background: #f8fafc; color: #1e293b; }
        .tab-active { border-bottom: 4px solid #2563eb; color: #1e40af; font-weight: 800; }
        .is-draft { border: 2px dashed #3b82f6 !important; opacity: 0.7; }
        .is-preview { border: 2px solid #3b82f6 !important; background: #eff6ff !important; animation: pulse 2s infinite; }
        .my-shift { border: 2px solid #f59e0b !important; background: #fffbeb !important; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        .hidden { display: none; }
        input, select { outline: none; transition: all 0.2s; }
        input:focus { ring: 2px; ring-color: #3b82f6; }
    </style>
</head>
<body class="min-h-screen flex flex-col overflow-x-hidden">

<div id="login-screen" class="fixed inset-0 bg-slate-900 z-50 flex items-center justify-center p-4">
    <div class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-sm text-center border-t-8 border-blue-600">
        <h1 class="text-3xl font-black mb-8 text-slate-800 italic uppercase tracking-tighter">SOC MASTER</h1>
        <div class="space-y-4">
            <input type="email" id="l-email" placeholder="אימייל" class="w-full p-4 border rounded-2xl text-right bg-slate-50 focus:border-blue-500">
            <input type="password" id="l-pass" placeholder="סיסמה" class="w-full p-4 border rounded-2xl text-right bg-slate-50 focus:border-blue-500">
            <button onclick="login()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold text-lg shadow-lg hover:bg-blue-700 active:scale-95 transition">כניסה למערכת</button>
        </div>
    </div>
</div>

<div id="app" class="hidden flex-1 flex flex-col overflow-hidden">
    <nav class="bg-slate-900 text-white p-4 flex justify-between items-center px-6 sticky top-0 z-40 shadow-xl">
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-shield-halved text-blue-400 text-xl"></i>
            <span class="font-black italic text-blue-400 text-lg">SOC MASTER PRO</span>
        </div>
        <div class="flex items-center gap-4">
            <span id="user-display" class="text-xs opacity-70 font-bold"></span>
            <button onclick="location.reload()" class="text-xs font-bold border border-white/20 px-4 py-2 rounded-full hover:bg-red-600 transition">התנתק</button>
        </div>
    </nav>

    <div class="flex gap-4 border-b bg-white px-6 overflow-x-auto whitespace-nowrap sticky top-[60px] z-30 shadow-sm scrollbar-hide">
        <button onclick="showTab('board')" id="t-board" class="tab-active py-4 px-2 font-bold text-sm">📅 לוח משמרות</button>
        <button onclick="showTab('personal')" id="t-personal" class="py-4 px-2 text-blue-600 font-bold text-sm">📋 הגשת זמינות</button>
        <button onclick="showTab('vacation')" id="t-vacation" class="py-4 px-2 text-emerald-600 font-bold text-sm">🌴 חופשה / מילואים</button>
        <div class="hidden admin-only flex gap-4">
            <button onclick="showTab('scheduling')" id="t-scheduling" class="py-4 px-2 text-indigo-700 font-bold text-sm border-r pr-4 border-slate-200">🛠 ניהול שיבוץ</button>
            <button onclick="showTab('team')" id="t-team" class="py-4 px-2 text-slate-600 font-bold text-sm">👥 ניהול צוות</button>
            <button onclick="showTab('admin-vac')" id="t-admin-vac" class="py-4 px-2 text-red-600 font-bold text-sm">🔔 אישורים</button>
            <button onclick="showTab('vacation-log')" id="t-vacation-log" class="py-4 px-2 text-orange-600 font-bold text-sm">🗓 יומן חופשות</button>
        </div>
    </div>

    <main class="p-4 md:p-8 flex-1 overflow-y-auto text-right pb-24">
        
        <div id="v-board" class="max-w-7xl mx-auto space-y-4">
            <div class="flex justify-between items-center bg-white p-4 rounded-2xl border shadow-sm">
                <button onclick="moveWeek(-7)" class="p-2 hover:bg-slate-100 rounded-full transition">➡️</button>
                <h2 id="week-label" class="font-black text-slate-700"></h2>
                <button onclick="moveWeek(7)" class="p-2 hover:bg-slate-100 rounded-full transition">⬅️</button>
            </div>
            <div id="grid" class="grid grid-cols-1 md:grid-cols-7 gap-3 text-center"></div>
        </div>

        <div id="v-scheduling" class="hidden max-w-4xl mx-auto space-y-6">
            <div class="bg-gradient-to-l from-indigo-600 to-blue-700 p-6 rounded-3xl text-white shadow-xl flex justify-between items-center">
                <div>
                    <h3 class="font-bold text-xl uppercase italic">AI Smart Schedular</h3>
                    <p class="text-xs opacity-80">מילוי אוטומטי המבוסס על חסימות, מנוחה וחופשות.</p>
                </div>
                <button onclick="runAutoAssign()" class="bg-white text-indigo-700 px-8 py-3 rounded-2xl font-black shadow-lg hover:bg-indigo-50 transition">שבץ הכל</button>
            </div>
            <div class="bg-white p-6 border rounded-3xl shadow-sm space-y-4">
                <h4 class="font-black text-slate-700 border-b pb-2 italic">שיבוץ ידני / מילוי חורים</h4>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="text-[10px] font-bold block mb-1">תאריך:</label>
                        <input type="date" id="s-date" onchange="checkAvail()" class="w-full border p-3 rounded-xl bg-slate-50">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold block mb-1">משמרת:</label>
                        <select id="s-type" onchange="checkAvail()" class="w-full border p-3 rounded-xl bg-slate-50 font-bold">
                            <option>בוקר</option><option>ערב</option><option>לילה</option><option>אחר</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold block mb-1">שעות מיוחדות:</label>
                        <input type="text" id="s-hours" placeholder="למשל: 08:00-16:00" class="w-full border p-3 rounded-xl bg-slate-50">
                    </div>
                </div>
                <div id="avail-list" class="border p-4 rounded-xl h-48 overflow-y-auto text-xs bg-slate-50 space-y-1 shadow-inner">
                    <p class="text-center opacity-50 py-10 italic">בחר תאריך כדי לראות מי פנוי</p>
                </div>
                <button onclick="saveShift()" id="btn-save" disabled class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black opacity-50 shadow-md">שבץ בלוח</button>
            </div>
            <button onclick="publishWeek()" class="bg-emerald-600 text-white p-5 rounded-3xl w-full font-black text-xl shadow-2xl hover:bg-emerald-700 transition">📢 פרסם סידור רשמי לצוות</button>
        </div>

        <div id="v-personal" class="hidden max-w-5xl mx-auto bg-white p-6 rounded-3xl shadow-2xl border">
            <h3 class="font-black text-xl mb-4 text-slate-800 border-b pb-2 text-center">הגשת זמינות שבועית</h3>
            <div class="flex justify-between items-center mb-6 bg-slate-100 p-4 border rounded-3xl">
                <button onclick="movePersonalWeek(-7)" class="text-xl">➡️</button>
                <span id="p-week-label" class="font-black text-blue-700"></span>
                <button onclick="movePersonalWeek(7)" class="text-xl">⬅️</button>
            </div>
            <div class="overflow-x-auto rounded-xl border shadow-inner">
                <table class="w-full border-collapse min-w-[600px]">
                    <thead><tr id="p-days-row" class="bg-slate-200"></tr></thead>
                    <tbody id="p-matrix-body"></tbody>
                </table>
            </div>
            <button onclick="saveAvailability()" class="mt-8 w-full bg-indigo-600 text-white p-6 rounded-3xl font-black text-xl shadow-xl active:scale-95 transition">💾 שלח זמינות למנהל</button>
        </div>

        <div id="v-vacation" class="hidden max-w-md mx-auto bg-white p-8 rounded-3xl shadow-xl space-y-6 border-t-8 border-emerald-500">
            <h3 class="font-black text-xl text-slate-800 italic border-b pb-2">הגשת בקשת היעדרות</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-xs font
