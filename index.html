<div class="bg-white p-6 border rounded-3xl shadow-md border-t-8 border-indigo-500 mt-6 space-y-4 text-right">
    <h3 class="font-black text-indigo-800 italic uppercase">הגדרות דדליין להגשה</h3>
    <p class="text-[10px] opacity-70">קבע מתי המערכת תינעל להגשת זמינות שבועית עבור אנליסטים:</p>
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
            <label class="text-xs font-bold">יום בשבוע:</label>
            <select id="set-day" class="w-full border p-3 rounded-xl bg-slate-50 font-bold">
                <option value="6">ראשון</option><option value="0">שני</option><option value="1">שלישי</option>
                <option value="2">רביעי</option><option value="3">חמישי</option><option value="4">שישי</option>
                <option value="5">שבת</option>
            </select>
        </div>
        <div>
            <label class="text-xs font-bold">שעה אחרונה:</label>
            <input type="time" id="set-time" class="w-full border p-3 rounded-xl bg-slate-50">
        </div>
    </div>
    <button onclick="updateSettings()" class="w-full bg-indigo-600 text-white p-3 rounded-xl font-bold shadow-md hover:bg-indigo-800 transition">עדכן הגדרות דדליין</button>
</div>

<script>
    // הוסף פונקציות אלו בתוך ה-Script
    async function loadSettings() {
        const res = await fetch(`${API_URL}/api/admin/settings`);
        const s = await res.json();
        document.getElementById('set-day').value = s.deadline_day;
        document.getElementById('set-time').value = s.deadline_time;
    }

    async function updateSettings() {
        const d = document.getElementById('set-day').value;
        const t = document.getElementById('set-time').value;
        await fetch(`${API_URL}/api/admin/settings`, {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({day: d, time: t})
        });
        alert("ההגדרות עודכנו! המערכת תינעל ביום ובשעה שקבעת.");
    }

    // עדכון ה-showTab שיפעיל את loadSettings בלחיצה על צוות
    function showTab(t) {
        // ... (הקוד הקיים)
        if(t==='team') { loadStaff(); loadSettings(); }
    }

    // עדכון שמירת הזמינות עם טיפול בשגיאת דדליין
    async function saveAvailability() {
        const cells = document.querySelectorAll('[id^="cell-"]');
        try {
            for (let c of cells) {
                if (c.getAttribute('data-state') === 'x') {
                    const p = c.id.split('-');
                    const res = await fetch(`${API_URL}/api/requests`, {
                        method:'POST', 
                        headers:{'Content-Type':'application/json'}, 
                        body:JSON.stringify({
                            name:userData.name, 
                            email:userData.email, 
                            date:`${p[1]}-${p[2]}-${p[3]}`, 
                            req_type:'חסום: '+p[4], 
                            reason:'X'
                        })
                    });
                    if (!res.ok) {
                        const err = await res.json();
                        throw new Error(err.detail);
                    }
                }
            }
            alert("נשלח בהצלחה!");
            showTab('board');
        } catch (e) {
            alert(e.message);
        }
    }
</script>
