<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOC MASTER ULTIMATE v22</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap');
        body { font-family: 'Assistant', sans-serif; background: #f8fafc; }
        .tab-active { border-bottom: 4px solid #2563eb; color: #1e40af; font-weight: 800; }
        .is-draft { border: 2px dashed #3b82f6 !important; opacity: 0.7; }
        .is-preview { border: 2px solid #3b82f6 !important; background: #eff6ff !important; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        .hidden { display: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

<div id="login-screen" class="fixed inset-0 bg-slate-900 z-50 flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center">
        <h1 class="text-3xl font-black mb-8 text-blue-600 italic uppercase">SOC MASTER</h1>
        <input type="email" id="l-email" placeholder="אימייל" class="w-full p-4 border rounded-2xl mb-4 text-right bg-slate-50 outline-none">
        <input type="password" id="l-pass" placeholder="סיסמה" class="w-full p-4 border rounded-2xl mb-6 text-right bg-slate-50 outline-none">
        <button onclick="login()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold text-lg shadow-lg">כניסה</button>
    </div>
</div>

<div id="app" class="hidden flex-1 flex flex-col overflow-hidden">
    <nav class="bg-slate-900 text-white p-4 flex justify-between items-center px-6 sticky top-0 z-40 shadow-xl">
        <span class="font-black italic text-blue-400">SOC MASTER PRO</span>
        <button onclick="location.reload()" class="text-xs font-bold border border-white/20 px-4 py-1.5 rounded-full">התנתק</button>
    </nav>

    <div class="flex gap-4 border-b bg-white px-6 overflow-x-auto whitespace-nowrap sticky top-[56px] z-30 shadow-sm">
        <button onclick="showTab('board')" id="t-board" class="tab-active py-4 px-2 font-bold text-sm">📅 לוח</button>
        <button onclick="showTab('personal')" id="t-personal" class="py-4 px-2 text-blue-600 font-bold text-sm">📋 זמינות</button>
        <button onclick="showTab('vacation')" id="t-vacation" class="py-4 px-2 text-emerald-600 font-bold text-sm">🌴 חופשה/מילואים</button>
        <div class="hidden admin-only flex gap-4">
            <button onclick="showTab('scheduling')" id="t-scheduling" class="py-4 px-2 text-indigo-700 font-bold text-sm border-r pr-4">🛠 שיבוץ</button>
            <button onclick="showTab('team')" id="t-team" class="py-4 px-2 text-slate-600 font-bold text-sm">👥 צוות</button>
            <button onclick="showTab('admin-vac')" id="t-admin-vac" class="py-4 px-2 text-red-600 font-bold text-sm">🔔 אישורים</button>
            <button onclick="showTab('vacation-log')" id="t-vacation-log" class="py-4 px-2 text-orange-600 font-bold text-sm">🗓 יומן חופשות</button>
        </div>
    </div>

    <main class="p-4 md:p-8 flex-1 overflow-y-auto text-right pb-24">
        <div id="v-board" class="max-w-7xl mx-auto space-y-4">
            <div class="flex justify-between items-center bg-white p-4 rounded-xl border shadow-sm"><button onclick="moveWeek(-7)">➡️</button><h2 id="week-label" class="font-black text-sm"></h2><button onclick="moveWeek(7)">⬅️</button></div>
            <div id="grid" class="grid grid-cols-1 md:grid-cols-7 gap-3 text-center"></div>
        </div>

        <div id="v-vacation" class="hidden max-w-md mx-auto bg-white p-8 rounded-3xl shadow-xl space-y-4">
            <h3 class="font-bold border-b pb-2 italic">בקשת היעדרות</h3>
            <select id="v-type" class="w-full border p-3 rounded-xl bg-slate-50 font-bold"><option value="חופשה">🌴 חופשה</option><option value="מילואים">🪖 מילואים</option></select>
            <div class="grid grid-cols-2 gap-4"><input type="date" id="v-start" class="border p-3 rounded-xl"><input type="date" id="v-end" class="border p-3 rounded-xl"></div>
            <button onclick="sendVacation()" class="w-full bg-emerald-600 text-white p-4 rounded-xl font-bold">שלח לאישור</button>
        </div>

        <div id="v-scheduling" class="hidden max-w-4xl mx-auto space-y-6">
            <div class="bg-indigo-700 p-6 rounded-3xl text-white flex justify-between items-center">
                <div><h3 class="font-bold text-xl uppercase italic">AI Schedular</h3><p class="text-xs opacity-70">תצוגה מקדימה לפני שמירה.</p></div>
                <button onclick="runAutoAssign()" class="bg-white text-indigo-700 px-8 py-3 rounded-xl font-black">שבץ הכל</button>
            </div>
            <div class="bg-white p-4 border rounded-2xl space-y-4 shadow-sm">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <input type="date" id="s-date" onchange="checkAvail()" class="border p-3 rounded-xl bg-slate-50">
                    <select id="s-type" onchange="checkAvail()" class="border p-3 rounded-xl bg-slate-50 font-bold"><option>בוקר</option><option>ערב</option><option>לילה</option><option>אחר</option></select>
                    <input type="text" id="s-hours" placeholder="שעות (08:00-16:00)" class="border p-3 rounded-xl bg-slate-50">
                </div>
                <div id="avail-list" class="border p-4 rounded-xl h-48 overflow-y-auto text-xs bg-slate-50 space-y-1"></div>
                <button onclick="saveShift()" id="btn-save" disabled class="w-full bg-slate-900 text-white py-4 rounded-xl font-black opacity-50">שבץ ידני</button>
            </div>
        </div>

        <div id="v-admin-vac" class="hidden max-w-2xl mx-auto space-y-3"></div>
        <div id="v-vacation-log" class="hidden max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        <div id="v-team" class="hidden max-w-4xl mx-auto space-y-6 text-right">
             </div>
    </main>

    <div id="preview-controls" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-900 text-white p-6 rounded-3xl shadow-2xl flex gap-4 z-50 border-2 border-blue-500">
        <div class="text-right ml-4"><p class="font-black text-sm text-blue-400">Preview Mode</p><p class="text-[10px] opacity-80">השיבוץ טרם נשמר</p></div>
        <button onclick="confirmAutoAssign()" class="bg-blue-600 px-6 py-2 rounded-xl font-bold">אשר ושמור</button>
        <button onclick="cancelPreview()" class="bg-red-500 px-6 py-2 rounded-xl font-bold">בטל</button>
    </div>
</div>

<script>
    const API_URL = window.location.origin;
    let userData = null; let suggestedShifts = [];
    let currentSun = (function(d){ d.setHours(0,0,0,0); return new Date(d.setDate(d.getDate() - d.getDay())); })(new Date());
    let pSun = new Date(currentSun);

    async function login() {
        const e=document.getElementById('l-email').value, p=document.getElementById('l-pass').value;
        const res = await fetch(`${API_URL}/api/login`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email:e, password:p})});
        if(res.ok) {
            userData = (await res.json()).user;
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            if(userData.role==='Admin') document.querySelectorAll('.admin-only').forEach(x=>x.classList.remove('hidden'));
            showTab('board');
        } else alert("פרטים שגויים");
    }

    function showTab(t) {
        ['board', 'scheduling', 'team', 'personal', 'vacation', 'admin-vac', 'vacation-log'].forEach(id => {
            const v = document.getElementById('v-'+id); const b = document.getElementById('t-'+id);
            if(v) v.classList.add('hidden'); if(b) b.classList.remove('tab-active');
        });
        document.getElementById('v-'+t).classList.remove('hidden'); document.getElementById('t-'+t).classList.add('tab-active');
        if(t==='board') renderBoard(); if(t==='personal') renderMatrix(); if(t==='team') { loadStaff(); loadSettings(); }
        if(t==='admin-vac') loadVacations(); if(t==='vacation-log') loadVacationLog();
    }

    async function renderBoard(isPreview = false) {
        const res = await fetch(`${API_URL}/api/shifts`); const data = await res.json();
        let shifts = data.shifts;
        if (isPreview) shifts = [...shifts.filter(s => s.is_draft === 0), ...suggestedShifts.map(s => ({...s, is_preview: true}))];
        
        const grid = document.getElementById('grid'); grid.innerHTML = '';
        for(let i=0; i<7; i++) {
            let d = new Date(currentSun); d.setDate(d.getDate() + i); let dStr = d.toISOString().split('T')[0];
            let html = `<div class="bg-white border rounded-2xl shadow-sm min-h-[160px] overflow-hidden"><div class="bg-slate-800 text-white p-2 font-bold text-[10px]">${d.getDate()}/${d.getMonth()+1}</div><div class="p-2 space-y-2">`;
            shifts.filter(s => s.date === dStr).forEach(s => {
                if(s.is_draft && userData.role !== 'Admin' && !s.is_preview) return;
                let display = s.hours ? s.hours : s.type;
                let style = s.is_preview ? 'is-preview' : (s.is_draft ? 'is-draft bg-blue-50' : 'bg-slate-50');
                html += `<div class="p-2 text-[10px] rounded-lg border font-bold ${style}">${display}: ${s.staff}</div>`;
            });
            grid.innerHTML += html + `</div></div>`;
        }
    }

    async function runAutoAssign() {
        const s = currentSun.toISOString().split('T')[0];
        const res = await fetch(`${API_URL}/api/shifts/auto-assign-preview`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({start:s})});
        const data = await res.json();
        if(data.status === 'ok') {
            suggestedShifts = data.suggested;
            renderBoard(true);
            document.getElementById('preview-controls').classList.remove('hidden');
        }
    }

    async function confirmAutoAssign() {
        const s = currentSun.toISOString().split('T')[0], e = new Date(currentSun); e.setDate(e.getDate() + 6);
        await fetch(`${API_URL}/api/shifts/save-bulk`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({start: s, end: e.toISOString().split('T')[0], shifts: suggestedShifts})});
        alert("נשמר!"); cancelPreview();
    }

    function cancelPreview() {
        suggestedShifts = []; document.getElementById('preview-controls').classList.add('hidden'); renderBoard();
    }

    // הוסף את יתר הפונקציות (sendVacation, loadStaff, וכו') מהגרסאות הקודמות...
</script>
</body>
</html>
