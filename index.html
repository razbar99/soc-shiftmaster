<button onclick="showTab('handover')" id="t-handover" class="px-4 py-2 text-orange-600 font-bold italic whitespace-nowrap">חפיפת משמרת</button>

<div id="stats-bar" class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
    <div class="bg-white p-4 rounded-xl shadow-sm border-r-4 border-blue-500">
        <div class="text-xs text-slate-500 uppercase">משמרות במערכת</div>
        <div id="stat-shifts" class="text-2xl font-bold">0</div>
    </div>
    <div class="bg-white p-4 rounded-xl shadow-sm border-r-4 border-green-500">
        <div class="text-xs text-slate-500 uppercase">צוות SOC פעיל</div>
        <div id="stat-users" class="text-2xl font-bold">0</div>
    </div>
    <div class="bg-white p-4 rounded-xl shadow-sm border-r-4 border-red-500">
        <div class="text-xs text-slate-500 uppercase">בקשות ממתינות</div>
        <div id="stat-reqs" class="text-2xl font-bold">0</div>
    </div>
</div>

<div id="v-handover" class="max-w-4xl mx-auto hidden space-y-6">
    <div class="bg-white p-6 rounded-2xl shadow-md border border-orange-200">
        <h3 class="font-bold mb-4 text-orange-800 italic">דיווח חפיפת משמרת (Handover)</h3>
        <div class="space-y-4">
            <select id="h-type" class="w-full p-2 border rounded bg-slate-50">
                <option value="בוקר לערב">בוקר ⬅️ ערב</option>
                <option value="ערב ללילה">ערב ⬅️ לילה</option>
                <option value="לילה לבוקר">לילה ⬅️ בוקר</option>
            </select>
            <textarea id="h-content" placeholder="פרט דגשים, אירועים פתוחים או תקלות SIEM..." class="w-full p-3 border rounded-lg h-32"></textarea>
            <button onclick="saveHandover()" class="w-full bg-orange-600 text-white font-bold py-3 rounded-lg hover:bg-orange-700 shadow-md">שלח חפיפה למערכת</button>
        </div>
    </div>
    <div id="handover-list" class="space-y-3"></div>
</div>

<script>
// פונקציות חדשות ל-Enterprise
async function loadStats() {
    const res = await fetch(`${API_URL}/api/stats`);
    const d = await res.json();
    document.getElementById('stat-shifts').innerText = d.shifts;
    document.getElementById('stat-users').innerText = d.users;
    document.getElementById('stat-reqs').innerText = d.pending_reqs;
}

async function saveHandover() {
    const content = document.getElementById('h-content').value;
    if(!content) return alert("נא למלא תוכן לחפיפה");
    await fetch(`${API_URL}/api/handovers`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({author: userData.name, shift_type: document.getElementById('h-type').value, content: content})
    });
    document.getElementById('h-content').value = '';
    alert("החפיפה נשמרה ביומן המבצעים");
    loadHandovers();
}

async function loadHandovers() {
    const res = await fetch(`${API_URL}/api/handovers`);
    const data = await res.json();
    document.getElementById('handover-list').innerHTML = data.map(h => `
        <div class="bg-white p-4 rounded-xl shadow-sm border-r-4 border-orange-400">
            <div class="flex justify-between text-xs text-slate-400 mb-1">
                <span>${h.date} | ${h.timestamp}</span>
                <span class="font-bold text-orange-600">${h.shift_type}</span>
            </div>
            <div class="text-sm font-semibold">${h.author}:</div>
            <div class="text-sm text-slate-700 mt-1">${h.content}</div>
        </div>
    `).join('');
}

// קריאה לפונקציות בכניסה
// (תוסיף את loadStats() לתוך הפונקציה renderBoard)
</script>
