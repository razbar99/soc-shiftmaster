<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOC MASTER PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap');
        body { font-family: 'Assistant', sans-serif; background-color: #f1f5f9; }
        .tab-active { border-bottom: 4px solid #2563eb; color: #1e40af; font-weight: 700; }
        .my-shift { border: 3px solid #f59e0b !important; box-shadow: 0 0 10px rgba(245, 158, 11, 0.3); }
    </style>
</head>
<body class="text-slate-800 h-screen flex flex-col">

    <div id="login-screen" class="fixed inset-0 bg-slate-900 z-50 flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-sm">
            <h1 class="text-2xl font-bold mb-6 text-center text-blue-600 italic">SOC SECURE LOGIN</h1>
            <div class="space-y-4">
                <input type="email" id="l-email" placeholder="אימייל" class="w-full p-3 border rounded-lg bg-slate-50 outline-none text-right">
                <input type="password" id="l-pass" placeholder="סיסמה" class="w-full p-3 border rounded-lg bg-slate-50 outline-none text-right">
                <button onclick="login()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition text-lg">כניסה למערכת</button>
            </div>
        </div>
    </div>

    <div id="app" style="display:none" class="flex flex-col h-full overflow-hidden">
        <nav class="bg-slate-900 text-white p-4 flex justify-between items-center px-8 shadow-lg">
            <div class="text-xl font-bold italic"><i class="fa-solid fa-shield-halved text-blue-400"></i> SOC MASTER</div>
            <div class="flex items-center gap-4">
                <span id="display-name" class="font-medium bg-slate-800 px-3 py-1 rounded-lg"></span>
                <button onclick="location.reload()" class="text-slate-400 hover:text-white text-sm border border-slate-700 px-2 py-1 rounded">התנתק</button>
            </div>
        </nav>

        <div class="flex-1 overflow-y-auto p-4">
            <div class="max-w-7xl mx-auto mb-6 flex gap-4 border-b border-slate-200 overflow-x-auto">
                <button onclick="showTab('board')" id="t-board" class="tab-active px-4 py-2 whitespace-nowrap">לוח משמרות</button>
                <button onclick="showTab('admin')" id="t-admin" class="px-4 py-2 hidden admin-only text-blue-700 whitespace-nowrap font-bold italic border-blue-200">ניהול ושיבוץ</button>
                <button onclick="showTab('staff')" id="t-staff" class="px-4 py-2 hidden admin-only text-green-700 whitespace-nowrap font-bold italic">ניהול צוות</button>
                <button onclick="showTab('personal')" id="t-personal" class="px-4 py-2 whitespace-nowrap">הגשת בקשה</button>
            </div>

            <div id="v-board" class="max-w-7xl mx-auto">
                <div class="flex justify-between items-center mb-6 bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                    <button onclick="moveWeek(-7)" class="p-2 hover:bg-slate-100 rounded-full w-10 h-10"><i class="fa-solid fa-chevron-right"></i></button>
                    <h2 id="week-label" class="text-xl font-bold text-slate-700"></h2>
                    <button onclick="moveWeek(7)" class="p-2 hover:bg-slate-100 rounded-full w-10 h-10"><i class="fa-solid fa-chevron-left"></i></button>
                </div>
                <div id="grid" class="grid grid-cols-1 md:grid-cols-7 gap-4"></div>
            </div>

            <div id="v-admin" class="max-w-4xl mx-auto hidden space-y-8">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h3 class="font-bold mb-4 text-blue-800"><i class="fa-solid fa-plus-circle ml-2"></i>שיבוץ משמרת חדשה</h3>
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <input type="date" id="s-date" class="p-2 border rounded-lg bg-slate-50 shadow-sm outline-none focus:ring-2 focus:ring-blue-400">
                        <select id="s-type" class="p-2 border rounded-lg bg-slate-50 shadow-sm outline-none focus:ring-2 focus:ring-blue-400">
                            <option value="בוקר">בוקר (07-15)</option>
                            <option value="ערב">ערב (15-23)</option>
                            <option value="לילה">לילה (23-07)</option>
                        </select>
                        <select id="s-staff-list" class="p-2 border rounded-lg bg-slate-50 shadow-sm outline-none focus:ring-2 focus:ring-blue-400"></select>
                        <button onclick="saveShift()" class="bg-blue-600 text-white rounded-lg font-bold shadow-md hover:bg-blue-700 transition">שמור שיבוץ</button>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h3 class="font-bold mb-4 border-b pb-2"><i class="fa-solid fa-clock-rotate-left ml-2"></i>בקשות ממתינות לאישור</h3>
                    <div id="req-list" class="space-y-3"></div>
                </div>
            </div>

            <div id="v-staff" class="max-w-4xl mx-auto hidden space-y-8">
                <div class="bg-white p-6 rounded-2xl shadow-sm border-t-4 border-green-500 shadow-md">
                    <h3 class="font-bold mb-4 italic text-green-700 text-lg">הוספת עובד SOC חדש</h3>
                    <div class="grid grid-cols-1 md:grid-cols-5 gap-4 items-end">
                        <div class="space-y-1">
                            <label class="text-xs text-slate-500">שם מלא</label>
                            <input type="text" id="n-name" placeholder="למשל: ליאור שם טוב" class="p-2 border rounded w-full">
                        </div>
                        <div class="space-y-1">
                            <label class="text-xs text-slate-500">אימייל</label>
                            <input type="email" id="n-email" placeholder="example@soc.com" class="p-2 border rounded w-full text-left">
                        </div>
                        <div class="space-y-1">
                            <label class="text-xs text-slate-500">סיסמה</label>
                            <input type="text" id="n-pass" placeholder="סיסמה ראשונית" class="p-2 border rounded w-full text-left">
                        </div>
                        <div class="space-y-1">
                            <label class="text-xs text-slate-500">תפקיד במערכת</label>
                            <select id="n-role" class="p-2 border rounded w-full bg-slate-50 font-bold">
                                <option value="User">עובד SOC (רגיל)</option>
                                <option value="Admin">מנהל (הרשאות מלאות)</option>
                            </select>
                        </div>
                        <button onclick="addUser()" class="bg-green-600 text-white rounded-lg font-bold p-2 h-10 hover:bg-green-700 transition shadow-md">הוסף למערכת</button>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
