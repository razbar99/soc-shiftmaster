<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>SOC MASTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; background: #f1f5f9; }
        .tab-active { border-bottom: 3px solid blue; color: blue; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body class="h-screen flex flex-col">

<div id="login-screen" class="fixed inset-0 bg-slate-900 z-50 flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-xl w-80 text-center">
        <h1 class="text-xl font-bold mb-4">SOC MASTER LOGIN</h1>
        <input type="email" id="l-email" placeholder="אימייל" class="w-full p-2 border mb-3 text-right">
        <input type="password" id="l-pass" placeholder="סיסמה" class="w-full p-2 border mb-4 text-right">
        <button onclick="login()" class="w-full bg-blue-600 text-white p-2 rounded">כניסה</button>
    </div>
</div>

<div id="app" class="hidden flex-1 flex flex-col overflow-hidden">
    <nav class="bg-slate-900 text-white p-4 flex justify-between px-8">
        <span class="font-bold">SOC MASTER</span>
        <span id="display-name" class="text-xs"></span>
    </nav>

    <div class="p-4 flex gap-4 border-b bg-white">
        <button onclick="showTab('board')" id="t-board" class="tab-active px-3 py-1">לוח</button>
        <button onclick="showTab('admin')" id="t-admin" class="hidden admin-only px-3 py-1">ניהול</button>
        <button onclick="showTab('personal')" id="t-personal" class="px-3 py-1">חופשה</button>
    </div>

    <div class="flex-1 overflow-y-auto p-4">
        <div id="v-board" class="space-y-4">
            <div class="flex justify-between items-center bg-white p-2 border rounded">
                <button onclick="moveWeek(-7)">➡️</button><h2 id="week-label" class="font-bold"></h2><button onclick="moveWeek(7)">⬅️</button>
            </div>
            <div id="grid" class="grid grid-cols-1 md:grid-cols-7 gap-2"></div>
        </div>

        <div id="v-admin" class="hidden space-y-4">
            <button onclick="publishWeek()" class="w-full bg-blue-600 text-white p-3 rounded font-bold">פרסם סידור לשבוע זה</button>
            <div class="bg-white p-4 border rounded">
                <input type="date" id="s-date" onchange="checkAvail(this.value)" class="border p-1">
                <select id="s-type" class="border p-1"><option>בוקר</option><option>ערב</option><option>לילה</option></select>
                <div id="avail-list" class="border p-2 mt-2 h-24 overflow-y-auto text-xs"></div>
                <button onclick="saveShift()" id="btn-save" disabled class="mt-2 bg-black text-white px-4 py-1 rounded">שבץ</button>
            </div>
        </div>

        <div id="v-personal" class="hidden max-w-md mx-auto bg-white p-6 border rounded shadow">
            <h3 class="font-bold mb-4">הגשת חופשה</h3>
            <div class="flex gap-2 mb-2"><input type="date" id="p-start" class="w-1/2 border p-2"><input type="date" id="p-end" class="w-1/2 border p-2"></div>
            <button onclick="sendRangeReq()" class="w-full bg-indigo-600 text-white p-2 rounded">שלח</button>
        </div>
    </div>
</div>

<script>
    const API_URL = window.location.origin;
    let userData = null;
    let selectedStaff = "";
    let currentSun = (function(d){ d.setHours(0,0,0,0); return new Date(d.setDate(d.getDate() - d.getDay())); })(new Date());

    async function login() {
        const e = document.getElementById('l-email').value;
        const p = document.getElementById('l-pass').value;
        const res = await fetch(`${API_URL}/api/login`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email:e, password:p})});
        if(res.ok) {
            userData = (await res.json()).user;
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('display-name').innerText = userData.name;
            if(userData.role==='Admin') document.querySelectorAll('.admin-only').forEach(x=>x.classList.remove('hidden'));
            showTab('board');
        } else alert("טעות בפרטים");
    }

    function showTab(t) {
        ['board','admin','personal'].forEach(id => {
            const v = document.getElementById('v-'+id);
            const b = document.getElementById('t-'+id);
            if(v) v.classList.add('hidden');
            if(b) b.classList.remove('tab-active');
        });
        document.getElementById('v-'+t).classList.remove('hidden');
        document.getElementById('t-'+t).classList.add('tab-active');
        if(t==='board') renderBoard();
    }

    async function renderBoard() {
        const end = new Date(currentSun); end.setDate(end.getDate() + 6);
        document.getElementById('week-label').innerText = `${currentSun.getDate()}/${currentSun.getMonth()+1} - ${end.getDate()}/${end.getMonth()+1}`;
        const res = await fetch(`${API_URL}/api/shifts`); const shifts = await res.json();
        const grid = document.getElementById('grid'); grid.innerHTML = '';
        for(let i=0; i<7; i++) {
            let d = new Date(currentSun); d.setDate(d.getDate() + i); let dStr = d.toISOString().split('T')[0];
            let html = `<div class="bg-white border rounded min-h-[150px]"><div class="bg-slate-800 text-white text-center text-[10px] p-1">${d.getDate()}/${d.getMonth()+1}</div><div class="p-1 space-y-1">`;
            shifts.filter(s => s.date === dStr).forEach(s => {
                if(s.is_draft && userData.role !== 'Admin') return;
                html += `<div class="p-1 text-[9px] border rounded bg-blue-50">${s.type}: ${s.staff}</div>`;
            });
            grid.innerHTML += html + `</div></div>`;
        }
    }

    async function checkAvail(date) {
        const res = await fetch(`${API_URL}/api/admin/availability/${date}`);
        const users = await res.json();
        const list = document.getElementById('avail-list');
        list.innerHTML = users.map(u => `<div onclick="selectedStaff='${u.name}'; alert('נבחר: '+u.name)" class="p-1 border-b cursor-pointer ${u.is_blocked?'text-red-500':'text-green-600'}">${u.name}</div>`).join('');
        document.getElementById('btn-save').disabled = false;
    }

    async function saveShift() {
        await fetch(`${API_URL}/api/shifts/save`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({date:document.getElementById('s-date').value, type:document.getElementById('s-type').value, staff:selectedStaff})});
        renderBoard();
    }

    async function publishWeek() {
        const start = currentSun.toISOString().split('T')[0];
        const end = new Date(currentSun); end.setDate(end.getDate() + 6);
        await fetch(`${API_URL}/api/shifts/publish`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({start, end: end.toISOString().split('T')[0]})});
        alert("פורסם!"); renderBoard();
    }

    async function sendRangeReq() {
        let curr = new Date(document.getElementById('p-start').value);
        let end = new Date(document.getElementById('p-end').value);
        while(curr <= end) {
            await fetch(`${API_URL}/api/requests`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name:userData.name, email:userData.email, date:curr.toISOString().split('T')[0], req_type:'חופשה', reason:'טווח'})});
            curr.setDate(curr.getDate()+1);
        }
        alert("נשלח!"); showTab('board');
    }

    function moveWeek(d) { currentSun.setDate(currentSun.getDate() + d); renderBoard(); }
</script>
</body>
</html>
