<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>SOC MASTER PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@400;700&display=swap');
        body { font-family: 'Assistant', sans-serif; background: #f8fafc; }
        .tab-active { border-bottom: 3px solid #2563eb; color: #1e40af; font-weight: bold; }
        .is-draft { border: 2px dashed #3b82f6 !important; opacity: 0.7; }
    </style>
</head>
<body class="h-screen flex flex-col">

<div id="login-screen" class="fixed inset-0 bg-slate-900 z-50 flex items-center justify-center">
    <div class="bg-white p-8 rounded-xl shadow-2xl w-80 text-center">
        <h1 class="text-xl font-bold mb-4">SOC LOGIN</h1>
        <input type="email" id="l-email" placeholder="מייל" class="w-full p-2 border rounded mb-3 text-right">
        <input type="password" id="l-pass" placeholder="סיסמה" class="w-full p-2 border rounded mb-4 text-right">
        <button onclick="login()" class="w-full bg-blue-600 text-white p-2 rounded font-bold">כניסה</button>
    </div>
</div>

<div id="app" style="display:none" class="flex-1 flex flex-col overflow-hidden">
    <nav class="bg-slate-900 text-white p-4 flex justify-between px-8">
        <span class="font-bold tracking-widest text-blue-400">SOC MASTER</span>
        <span id="display-name" class="text-sm"></span>
    </nav>

    <div class="p-4 flex gap-4 border-b bg-white overflow-x-auto">
        <button onclick="showTab('board')" id="t-board" class="tab-active px-3 py-1">לוח</button>
        <button onclick="showTab('handover')" id="t-handover" class="px-3 py-1 text-orange-600">חפיפות</button>
        <button onclick="showTab('admin')" id="t-admin" class="hidden admin-only px-3 py-1 text-blue-700 font-bold">ניהול</button>
        <button onclick="showTab('personal')" id="t-personal" class="px-3 py-1 text-indigo-600">בקשה</button>
    </div>

    <div class="flex-1 overflow-y-auto p-4">
        <div id="v-board" class="max-w-6xl mx-auto">
            <div class="flex justify-between items-center mb-4"><button onclick="moveWeek(-7)">➡️</button><h2 id="week-label" class="font-bold"></h2><button onclick="moveWeek(7)">⬅️</button></div>
            <div id="grid" class="grid grid-cols-1 md:grid-cols-7 gap-2"></div>
        </div>

        <div id="v-handover" class="hidden max-w-2xl mx-auto space-y-4">
            <textarea id="h-content" class="w-full border p-2 rounded" placeholder="דגשי חפיפה..."></textarea>
            <button onclick="saveHandover()" class="bg-orange-600 text-white px-4 py-1 rounded">שלח</button>
            <div id="h-list" class="space-y-2"></div>
        </div>

        <div id="v-admin" class="hidden max-w-4xl mx-auto space-y-6">
            <button onclick="publishWeek()" class="bg-blue-600 text-white p-3 rounded-xl w-full font-bold shadow-lg">פרסם סידור לכולם</button>
            <div class="bg-white p-4 border rounded">
                <input type="date" id="s-date" class="border p-1">
                <select id="s-type" class="border p-1"><option>בוקר</option><option>ערב</option><option>לילה</option></select>
                <select id="s-list" class="border p-1"></select>
                <button onclick="saveShift()" class="bg-slate-800 text-white px-3 py-1 rounded">שבץ</button>
            </div>
            <div id="req-list" class="space-y-2"></div>
        </div>

        <div id="v-personal" class="hidden max-w-md mx-auto bg-white p-6 border rounded shadow">
            <h3 class="font-bold mb-4">הגשת אילוץ</h3>
            <input type="date" id="p-date" class="w-full border p-2 mb-2">
            <select id="p-type" class="w-full border p-2 mb-2"><option>אילוץ</option><option>מילואים</option></select>
            <textarea id="p-reason" class="w-full border p-2 mb-2" placeholder="סיבה..."></textarea>
            <button onclick="sendReq()" class="w-full bg-indigo-600 text-white p-2 rounded font-bold">שלח</button>
        </div>
    </div>
</div>

<script>
    const API_URL = window.location.origin;
    let userData = null;
    let currentSun = (function(d){ d.setHours(0,0,0,0); return new Date(d.setDate(d.getDate() - d.getDay())); })(new Date());

    async function login() {
        const email = document.getElementById('l-email').value;
        const pass = document.getElementById('l-pass').value;
        const res = await fetch(`${API_URL}/api/login`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({email, password: pass})});
        if(res.ok) {
            const d = await res.json(); userData = d.user;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            document.getElementById('display-name').innerText = userData.name;
            if(userData.role === 'Admin') document.querySelectorAll('.admin-only').forEach(e => e.classList.remove('hidden'));
            showTab('board');
        } else alert("טעות בפרטים");
    }

    function showTab(t) {
        ['board','handover','admin','personal'].forEach(v => { document.getElementById('v-'+v).classList.add('hidden'); document.getElementById('t-'+v).classList.remove('tab-active'); });
        document.getElementById('v-'+t).classList.remove('hidden');
        document.getElementById('t-'+t).classList.add('tab-active');
        if(t==='board') renderBoard();
        if(t==='handover') loadH();
        if(t==='admin') { loadR(); loadUsers(); }
    }

    async function renderBoard() {
        const end = new Date(currentSun); end.setDate(end.getDate() + 6);
        document.getElementById('week-label').innerText = `${currentSun.getDate()}/${currentSun.getMonth()+1} - ${end.getDate()}/${end.getMonth()+1}`;
        const res = await fetch(`${API_URL}/api/shifts`); const shifts = await res.json();
        const grid = document.getElementById('grid'); grid.innerHTML = '';
        for(let i=0; i<7; i++) {
            let d = new Date(currentSun); d.setDate(d.getDate() + i); let dStr = d.toISOString().split('T')[0];
            let dayHtml = `<div class="bg-white border rounded shadow-sm min-h-[200px]"><div class="bg-slate-800 text-white text-center text-xs p-1">${d.getDate()}/${d.getMonth()+1}</div><div class="p-1 space-y-1">`;
            shifts.filter(s => s.date === dStr).forEach(s => {
                if(s.is_draft && userData.role !== 'Admin') return;
                let draftCls = s.is_draft ? 'is-draft' : '';
                dayHtml += `<div class="p-1 text-[10px] rounded border bg-blue-50 ${draftCls}">${s.type}: ${s.staff}</div>`;
            });
            grid.innerHTML += dayHtml + `</div></div>`;
        }
    }

    async function saveShift() {
        const payload = { date: document.getElementById('s-date').value, shift_type: document.getElementById('s-type').value, staff: document.getElementById('s-list').value };
        await fetch(`${API_URL}/api/shifts`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload)});
        renderBoard();
    }

    async function publishWeek() {
        const start = currentSun.toISOString().split('T')[0];
        const end = new Date(currentSun); end.setDate(end.getDate() + 6);
        await fetch(`${API_URL}/api/shifts/publish`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({start, end: end.toISOString().split('T')[0]})});
        alert("פורסם!"); renderBoard();
    }

    async function saveHandover() {
        await fetch(`${API_URL}/api/handovers`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({author: userData.name, content: document.getElementById('h-content').value})});
        document.getElementById('h-content').value = ''; loadH();
    }

    async function loadH() {
        const res = await fetch(`${API_URL}/api/handovers`); const data = await res.json();
        document.getElementById('h-list').innerHTML = data.map(h => `<div class="p-2 border-r-4 border-orange-400 bg-white text-xs shadow-sm"><strong>${h.author}:</strong> ${h.content}</div>`).join('');
    }

    async function loadUsers() {
        const res = await fetch(`${API_URL}/api/users`); const users = await res.json();
        document.getElementById('s-list').innerHTML = users.map(u => `<option>${u.name}</option>`).join('');
    }

    async function sendReq() {
        const payload = { name: userData.name, email: userData.email, date: document.getElementById('p-date').value, req_type: document.getElementById('p-type').value, reason: document.getElementById('p-reason').value };
        await fetch(`${API_URL}/api/requests`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload)});
        alert("נשלח!");
    }

    async function loadR() {
        const res = await fetch(`${API_URL}/api/requests`); const data = await res.json();
        document.getElementById('req-list').innerHTML = data.filter(r => r.status === 'ממתין').map(r => `<div class="p-2 bg-white border rounded text-xs flex justify-between"><span>${r.name}: ${r.date}</span><button onclick="updateR(${r.id},'אושר')" class="text-green-600 font-bold ml-2 font-bold">V</button></div>`).join('');
    }

    async function updateR(id, status) {
        await fetch(`${API_URL}/api/requests/status`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({req_id: id, status})});
        loadR();
    }

    function moveWeek(d) { currentSun.setDate(currentSun.getDate() + d); renderBoard(); }
</script>
</body>
</html>
