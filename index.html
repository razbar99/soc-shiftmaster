<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOC MASTER ENTERPRISE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap');
        body { font-family: 'Assistant', sans-serif; background-color: #f1f5f9; }
        .tab-active { border-bottom: 4px solid #2563eb; color: #1e40af; font-weight: bold; }
        .my-shift { border: 3px solid #f59e0b !important; box-shadow: 0 0 10px rgba(245, 158, 11, 0.3); }
        .is-draft { border: 2px dashed #3b82f6 !important; opacity: 0.7; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden text-slate-800">

    <div id="login-screen" class="fixed inset-0 bg-slate-900 z-50 flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-sm text-center">
            <div class="w-20 h-20 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl">
                <i class="fa-solid fa-user-shield"></i>
            </div>
            <h1 class="text-2xl font-bold mb-6 text-slate-800 italic">SOC SECURE LOGIN</h1>
            <div class="space-y-4">
                <input type="email" id="l-email" placeholder="אימייל" class="w-full p-3 border rounded-lg bg-slate-50 outline-none text-right focus:ring-2 focus:ring-blue-500">
                <input type="password" id="l-pass" placeholder="סיסמה" class="w-full p-3 border rounded-lg bg-slate-50 outline-none text-right focus:ring-2 focus:ring-blue-500">
                <button onclick="login()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition shadow-lg">כניסה למערכת</button>
            </div>
        </div>
    </div>

    <div id="app" style="display:none" class="flex flex-col h-full overflow-hidden">
        <nav class="bg-slate-900 text-white p-4 flex justify-between items-center px-8 shadow-xl">
            <div class="text-xl font-bold italic flex items-center gap-2 text-blue-400">
                <i class="fa-solid fa-shield-halved"></i> SOC MASTER PRO
            </div>
            <div class="flex items-center gap-4">
                <span id="display-name" class="font-medium bg-slate-800 px-3 py-1 rounded text-sm border border-slate-700"></span>
                <button onclick="location.reload()" class="text-slate-400 hover:text-white text-xs border border-slate-700 px-2 py-1 rounded transition">התנתק</button>
            </div>
        </nav>

        <div class="flex-1 overflow-y-auto p-4 md:p-6">
            <div class="max-w-7xl mx-auto mb-6 flex gap-2 border-b border-slate-200 overflow-x-auto no-scrollbar">
                <button onclick="showTab('board')" id="t-board" class="tab-active px-4 py-2 whitespace-nowrap">לוח משמרות</button>
                <button onclick="showTab('handover')" id="t-handover" class="px-4 py-2 text-orange-600 font-bold whitespace-nowrap italic"><i class="fa-solid fa-book-medical ml-1"></i>יומן חפיפות</button>
                <button onclick="showTab('admin')" id="t-admin" class="px-4 py-2 hidden admin-only text-blue-700 font-bold whitespace-nowrap border-blue-100 italic">ניהול ושיבוץ</button>
                <button onclick="showTab('staff')" id="t-staff" class="px-4 py-2 hidden admin-only text-green-700 font-bold whitespace-nowrap italic">מכסות וצוות</button>
                <button onclick="showTab('personal')" id="t-personal" class="px-4 py-2 whitespace-nowrap font-medium text-indigo-600">הגשת אילוץ</button>
            </div>

            <div id="v-board" class="max-w-7xl mx-auto space-y-4">
                <div class="flex justify-between items-center bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                    <button onclick="moveWeek(-7)" class="p-2 hover:bg-slate-100 rounded-full w-10 h-10 transition"><i class="fa-solid fa-chevron-right"></i></button>
                    <h2 id="week-label" class="text-xl font-bold text-slate-700 tracking-tight"></h2>
                    <button onclick="moveWeek(7)" class="p-2 hover:bg-slate-100 rounded-full w-10 h-10 transition"><i class="fa-solid fa-chevron-left"></i></button>
                </div>
                <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-7 gap-3"></div>
            </div>

            <div id="v-handover" class="max-w-4xl mx-auto hidden space-y-6">
                <div class="bg-white p-6 rounded-xl border-r-8 border-orange-500 shadow-md">
                    <h3 class="font-bold mb-4 text-slate-800 text-lg">דיווח חפיפה מבצעי</h3>
                    <textarea id="h-content" placeholder="פרט אירועי סייבר, תקלות SIEM, או דגשים למשמרת הבאה..." class="w-full p-4 border rounded-lg bg-slate-50 min-h-[120px] outline-none focus:ring-2 focus:ring-orange-400"></textarea>
                    <button onclick="saveHandover()" class="mt-3 bg-orange-600 text-white px-8 py-2 rounded-lg font-bold hover:bg-orange-700 transition shadow-lg w-full md:w-auto">שלח ליומן המבצעים</button>
                </div>
                <div id="handover-list" class="space-y-4"></div>
            </div>

            <div id="v-admin" class="max-w-5xl mx-auto hidden space-y-8">
